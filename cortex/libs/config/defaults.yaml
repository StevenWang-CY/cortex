# Cortex Default Configuration
# These values can be overridden by environment variables or .env file

llm:
  # v0.2.1: Anthropic SDK transport. AWS Bedrock is the production path;
  # AsyncAnthropic (direct) and AsyncAnthropicVertex are escape hatches
  # selected by ANTHROPIC_PROVIDER / config.llm.provider.
  provider: bedrock
  bedrock:
    aws_region: us-east-2
    keychain_service: cortex.bedrock
    keychain_account: bearer_token
  use_keychain: true
  model_default: claude-sonnet-4-6
  model_fast: claude-haiku-4-5
  model_deep: claude-opus-4-7
  max_tokens: 1024
  temperature: 0.3
  timeout_seconds: 30.0
  cache_ttl_seconds: 300
  fallback_mode: rule_based
  max_concurrent_requests: 3
  circuit_failure_threshold: 5
  circuit_window_seconds: 60.0
  circuit_open_seconds: 30.0

capture:
  device_id: null
  fps: 30
  width: 640
  height: 480
  min_brightness: 50
  max_jitter_px: 5.0
  face_lost_tolerance_frames: 5

state:
  # Hysteresis thresholds
  entry_threshold: 0.85
  exit_threshold: 0.70

  # Dwell times (seconds before state transition)
  hyper_dwell_seconds: 30
  hypo_dwell_seconds: 60
  flow_dwell_seconds: 120

  # Exponential moving average alpha for smoothing
  ema_alpha: 0.3
  ml_enabled: false
  ml_min_labeled_episodes: 30
  ml_alpha_max: 0.7
  ml_alpha_full_at_episodes: 150

  # Overwhelm score weights (should sum to 1.0)
  weights:
    pulse_elevation: 0.20
    hrv_drop: 0.15
    blink_suppression: 0.12
    posture_collapse: 0.08
    mouse_thrashing: 0.15
    window_switching: 0.15
    workspace_complexity: 0.15

intervention:
  # Confidence thresholds for intervention levels
  overlay_threshold: 0.70
  simplified_threshold: 0.85
  guided_threshold: 0.95

  # Workspace complexity threshold to trigger
  complexity_threshold: 0.6

  # Cooldown and dismissal behavior
  cooldown_seconds: 60
  quiet_mode_minutes: 30
  max_dismissals: 3
  dismissal_window_minutes: 5
  timeout_minutes: 5

  # Adaptive threshold adjustment on dismissal
  dismissal_threshold_bump: 0.05
  dismissal_decay_hours: 1
  receptivity_enforced: true
  receptivity_typing_burst_seconds: 10.0
  receptivity_block_fullscreen: true
  receptivity_block_if_mic_active: true
  receptivity_work_hours_start: 7
  receptivity_work_hours_end: 22
  adaptive_threshold_enabled: true
  adaptive_threshold_min: 0.75
  adaptive_threshold_max: 0.95
  dismissal_model_enabled: true
  dismissal_model_threshold: 0.6

handover:
  late_hour: 23

api:
  host: "127.0.0.1"
  port: 9472
  ws_port: 9473

telemetry:
  mouse_sample_hz: 60
  downsample_hz: 10
  window_seconds: 15

signal:
  rppg:
    window_seconds: 10
    stride_seconds: 1
    backend: pos
    model_path: cortex/models/tscan.onnx
    bandpass_low: 0.7
    bandpass_high: 3.5
    bandpass_order: 4
    welch_resolution: 0.1
    nsqi_threshold: 0.293
    min_cardiac_snr_db: 2.0
    min_resp_snr_db: 1.5
    max_face_loss_ratio: 0.20
    max_head_jitter_deg: 7.5
    hrv_min_window_seconds: 60
    hrv_min_valid_ibi: 30

  blink:
    ear_threshold: 0.21
    ear_recovery: 0.25
    min_frames: 3
    perclos_threshold: 0.2
    personalize_ear_percentile: 0.15

  posture:
    shoulder_drop_threshold: 0.15
    forward_lean_threshold: 20.0  # degrees

# MediaPipe FaceMesh landmark indices for ROI extraction
landmarks:
  forehead: [10, 67, 69, 104, 108, 151, 299, 337, 338]
  left_cheek: [50, 101, 116, 117, 118, 119, 120, 121]
  right_cheek: [280, 330, 345, 346, 347, 348, 349, 350]
  left_eye: [33, 160, 158, 133, 153, 144]
  right_eye: [362, 385, 387, 263, 373, 380]
  shoulders: [11, 12]  # MediaPipe Pose landmarks

storage:
  path: ./storage
  session_retention_days: 7
  feature_retention_days: 7
  error_retention_days: 90

debug:
  enabled: false
  capture: false
  rppg: false
  state: false
  llm: false

logging:
  level: INFO
  format: json
  include_timestamp: true

eval:
  policy: amip
  amip:
    enabled: true
    tau0: 1.0
    tau_min: 0.1
    epsilon_explore: 0.05
    epsilon_explore_after_500: 0.01
    safety_floor_stress_ratio: 1.0
    reward_window_seconds: 300
  causal_report:
    enabled: true
    bootstrap_samples: 300
    nightly_hour_local: 2
