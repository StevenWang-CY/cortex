name: ci

# Cortex CI gates two layers:
#
# 1. ``schema-codegen-check`` — audit Debt-1 drift gate. The committed
#    ``cortex/apps/browser_extension/types/generated/cortex_schemas.d.ts``
#    must stay in sync with the Pydantic source of truth in
#    ``cortex/libs/schemas/``. Any divergence fails the build and
#    blocks the merge until the developer runs
#    ``python -m cortex.scripts.generate_ts_schemas`` and commits the
#    refreshed file.
# 2. ``python`` + ``extension`` — F40 (TypeScript test infra) +
#    pytest/ruff/mypy. Standard quality gates.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on PR updates — saves runner minutes and
# guarantees the merge-gate result reflects the latest commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  schema-codegen-check:
    name: schema-codegen-check (Debt-1 drift gate)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node (for json2ts)
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      # ``pydantic-to-typescript`` shells out to ``json2ts`` from the
      # ``json-schema-to-typescript`` npm package. We install both
      # halves here; the Python script discovers ``json2ts`` on PATH.
      - name: Install json-schema-to-typescript
        run: npm install -g json-schema-to-typescript

      - name: Install Python codegen extras
        run: pip install -e "./cortex[codegen]"

      # The drift gate: regenerate into a tempfile and diff against
      # the committed copy. Exit 1 prints the diff and fails the job.
      - name: Verify cortex_schemas.d.ts is in sync
        run: python -m cortex.scripts.generate_ts_schemas --check

  ci-release-parity:
    # ci-parity-guard (audit): ci.yml's ``python`` job and release.yml's
    # ``ci-gate`` job MUST run the identical ruff + mypy + pytest
    # invocations, otherwise a PR can pass CI and then break the tag build
    # (exactly the drift this whole remediation closed). This job parses
    # both workflow files and fails if the ruff ``Lint``, mypy, or pytest
    # ``run:`` blocks diverge. Keeps the two surfaces honest with zero
    # extra deps beyond PyYAML (already a dev dependency).
    name: ci-release-parity (mypy/pytest drift gate)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Assert ci.yml and release.yml share ruff + mypy + pytest steps
        run: |
          python - <<'PY'
          import sys
          import yaml

          ci = yaml.safe_load(open(".github/workflows/ci.yml"))
          rel = yaml.safe_load(open(".github/workflows/release.yml"))

          def step_runs(job_steps):
              """Map each named step to its ``run:`` block."""
              out = {}
              for step in job_steps:
                  name = step.get("name", "")
                  if "run" in step:
                      out[name] = step["run"]
              return out

          ci_steps = step_runs(ci["jobs"]["python"]["steps"])
          rel_steps = step_runs(rel["jobs"]["ci-gate"]["steps"])

          mypy_name = "Typecheck (mypy --strict — blocking, full project)"
          pytest_name = "Test (pytest)"

          problems = []
          # ── name-matched steps (mypy + pytest): the display names are
          #    identical across both files, so we look each up by name and
          #    compare the ``run:`` command verbatim. ──
          for name in (mypy_name, pytest_name):
              c = ci_steps.get(name)
              r = rel_steps.get(name)
              if c is None:
                  problems.append(f"ci.yml python job is missing step {name!r}")
              if r is None:
                  problems.append(f"release.yml ci-gate job is missing step {name!r}")
              if c is not None and r is not None and c != r:
                  problems.append(
                      f"step {name!r} diverges between ci.yml and release.yml:\n"
                      f"  ci.yml:      {c!r}\n"
                      f"  release.yml: {r!r}"
                  )

          # ── command-matched step (ruff Lint): the two files use DIFFERENT
          #    display names ("Lint (ruff)" in ci.yml vs "Lint" in
          #    release.yml). Matching by name would make a harmless rename a
          #    false "missing step", so instead we LOCATE the lint step in
          #    each job by its command shape (a ``run:`` whose first non-
          #    blank token is ``ruff``) and compare the full command. A real
          #    flag divergence (e.g. one side adds ``--select``/``--fix`` or
          #    changes the target path) still fails the gate. ──
          def find_ruff_run(steps_by_name):
              hits = [
                  run for run in steps_by_name.values()
                  if run.strip().split(None, 1)[0:1] == ["ruff"]
              ]
              return hits

          ci_ruff = find_ruff_run(ci_steps)
          rel_ruff = find_ruff_run(rel_steps)
          if not ci_ruff:
              problems.append("ci.yml python job has no ruff Lint step")
          if not rel_ruff:
              problems.append("release.yml ci-gate job has no ruff Lint step")
          if len(ci_ruff) > 1:
              problems.append(f"ci.yml python job has >1 ruff step: {ci_ruff!r}")
          if len(rel_ruff) > 1:
              problems.append(f"release.yml ci-gate job has >1 ruff step: {rel_ruff!r}")
          if ci_ruff and rel_ruff and ci_ruff[0] != rel_ruff[0]:
              problems.append(
                  "ruff Lint command diverges between ci.yml and release.yml:\n"
                  f"  ci.yml:      {ci_ruff[0]!r}\n"
                  f"  release.yml: {rel_ruff[0]!r}"
              )

          if problems:
              print("ci/release parity FAILED:")
              for p in problems:
                  print(" -", p)
              sys.exit(1)
          print("ci.yml and release.yml ruff + mypy + pytest steps are in sync.")
          PY

  design-tokens-check:
    name: design-tokens-check (drift gate)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package (for PyYAML + cortex.scripts)
        run: pip install -e "./cortex[dev]"

      # P1-18: Regenerate all three token surfaces in memory and diff against
      # the committed copies. Exit 1 with a unified diff if any file is stale.
      # Developers fix by running:
      #   python -m cortex.scripts.sync_design_tokens --apply
      # and committing the result.
      - name: Verify design tokens are in sync
        run: python -m cortex.scripts.sync_design_tokens --check

  python:
    name: python (pytest + ruff + mypy)
    # Cortex is macOS-only — many of the PySide6 / pyobjc / AVFoundation
    # test paths can't run on Linux. Match the dev environment so the
    # gate reflects what local ``make ci`` produces.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e "./cortex[dev]"
      - name: Lint (ruff)
        run: ruff check cortex/
      - name: Typecheck (mypy --strict — blocking, full project)
        # Audit fix: previously the blocking scope was a curated subset
        # (libs/design + libs/llm) and the full tree ran with
        # ``|| true``. Tag release builds (release.yml) ran the full
        # ``mypy cortex/ --strict`` gate, so a PR could land green and
        # break the next release. Promote the strict full-project gate
        # to block PR merges as well so the two CI surfaces stay
        # aligned and tag-time surprises stop happening.
        #
        # ``--config-file cortex/pyproject.toml`` is REQUIRED: the job
        # runs from the repo root where mypy would otherwise never
        # discover ``[tool.mypy]`` (it lives under ``cortex/``). Without
        # it the pydantic plugin + per-module overrides are silently
        # dropped and the gate reports false errors. Kept byte-identical
        # with release.yml's pre-release gate.
        run: mypy --config-file cortex/pyproject.toml cortex/ --strict
      - name: Test (pytest)
        # ci-pytest-split (audit): a single ``pytest cortex/tests/``
        # SEGFAULTs during collection because PySide6/shiboken loads
        # after scipy/pyobjc have already initialised their own copies of
        # the same native libs. Split into TWO invocations: the whole suite
        # EXCEPT the PySide6 desktop_shell test (covers unit, integration,
        # services, state_engine, eval, physio, performance), then the
        # desktop_shell test isolated in its own interpreter. The earlier
        # three-way split silently dropped integration/state_engine/eval/
        # physio/performance coverage. ``QT_QPA_PLATFORM`` stays offscreen
        # for both. Kept byte-identical with the other workflow's gate
        # (enforced by the ci-release-parity job).
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          pytest cortex/tests/ --ignore=cortex/tests/unit/test_desktop_shell.py
          pytest cortex/tests/unit/test_desktop_shell.py

  eval-regression:
    name: eval-regression (F41 baseline gate)
    runs-on: ubuntu-latest
    # Audit-2 fix: the previous ``contains(github.event.pull_request.changed_files.*.filename, ...)``
    # expression was syntactically broken — ``changed_files`` on
    # ``pull_request`` is an integer count, not a list, so the filter
    # always evaluated to false and the job only ran on push. The new
    # ``dorny/paths-filter`` action correctly inspects the diff.
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Path filter
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            eval:
              - 'cortex/services/llm_engine/**'
              - 'cortex/services/state_engine/**'
              - 'cortex/services/eval/**'
              - 'cortex/libs/schemas/intervention.py'
      - name: Skip if no relevant changes
        if: github.event_name == 'pull_request' && steps.filter.outputs.eval != 'true'
        run: echo "No eval-relevant changes; skipping regression harness."
      - uses: actions/setup-python@v6
        if: github.event_name == 'push' || steps.filter.outputs.eval == 'true'
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install package
        if: github.event_name == 'push' || steps.filter.outputs.eval == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e "./cortex[dev]"
      - name: Run regression harness against committed baseline
        if: github.event_name == 'push' || steps.filter.outputs.eval == 'true'
        # Exits 1 on any metric outside its tolerance band. The harness
        # prints a human-readable report on stdout so the CI log shows
        # exactly which metric drifted; the developer either fixes the
        # regression or re-runs locally with --update-baseline.
        run: python -m cortex.services.eval.regression_harness

  extension:
    name: extension (lint + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cortex/apps/browser_extension
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: cortex/apps/browser_extension/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm exec tsc --noEmit
      - name: Test
        run: pnpm test

  extension-vscode:
    # vscode-tsc-gate (audit): the VS Code extension ships as a .vsix
    # bundled into Cortex.app. A type error in its TypeScript breaks
    # ``vsce package`` at release time with no PR-level signal. This job
    # compiles the extension exactly as ``vscode:prepublish`` does so
    # vsix-breaking type errors surface on every PR.
    name: extension-vscode (tsc compile)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cortex/apps/vscode_extension
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: cortex/apps/vscode_extension/package-lock.json
      - name: Install
        run: npm ci
      - name: Compile (tsc -p ./)
        run: npm run compile
