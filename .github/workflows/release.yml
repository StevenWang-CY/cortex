name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.1). The tag must already exist."
        required: true
        type: string

permissions:
  contents: write

jobs:
  ci-gate:
    name: Pre-release CI gate
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Cortex (dev + codegen)
        run: pip install -e "./cortex[dev,codegen]"

      - name: Install json2ts
        run: npm install -g json-schema-to-typescript

      - name: Lint
        run: ruff check cortex/

      - name: Typecheck (mypy --strict — blocking, full project)
        # Audit fix: previously the blocking scope was a curated subset
        # (libs/design + libs/llm) and the full tree ran with
        # ``|| true``. Tag release builds (release.yml) ran the full
        # ``mypy cortex/ --strict`` gate, so a PR could land green and
        # break the next release. Promote the strict full-project gate
        # to block PR merges as well so the two CI surfaces stay
        # aligned and tag-time surprises stop happening.
        #
        # ``--config-file cortex/pyproject.toml`` is REQUIRED: the job
        # runs from the repo root where mypy would otherwise never
        # discover ``[tool.mypy]`` (it lives under ``cortex/``). Without
        # it the pydantic plugin + per-module overrides are silently
        # dropped and the gate reports false errors. Kept byte-identical
        # with release.yml's pre-release gate.
        run: mypy --config-file cortex/pyproject.toml cortex/ --strict

      - name: Schema codegen drift
        run: python -m cortex.scripts.generate_ts_schemas --check

      - name: Test (pytest)
        # ci-pytest-split (audit): a single ``pytest cortex/tests/``
        # SEGFAULTs during collection because PySide6/shiboken loads
        # after scipy/pyobjc have already initialised their own copies of
        # the same native libs. Split into TWO invocations: the whole suite
        # EXCEPT the PySide6 desktop_shell test (covers unit, integration,
        # services, state_engine, eval, physio, performance), then the
        # desktop_shell test isolated in its own interpreter. The earlier
        # three-way split silently dropped integration/state_engine/eval/
        # physio/performance coverage. ``QT_QPA_PLATFORM`` stays offscreen
        # for both. Kept byte-identical with the other workflow's gate
        # (enforced by the ci-release-parity job).
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          pytest cortex/tests/ --ignore=cortex/tests/unit/test_desktop_shell.py
          pytest cortex/tests/unit/test_desktop_shell.py

  build-dmg:
    name: Build macOS .dmg
    needs: ci-gate
    runs-on: macos-14
    timeout-minutes: 45
    outputs:
      dmg-path: ${{ steps.locate.outputs.dmg-path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install pnpm
        # Audit fix: ``npm install -g pnpm`` pulled "whatever pnpm
        # tagged latest" at release time — silent version drift across
        # tag builds. ``pnpm/action-setup`` pins to the same version as
        # ci.yml so the lockfile that passed PR CI is the lockfile the
        # release build consumes.
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Install Cortex (dev)
        run: pip install -e "./cortex[dev]"

      - name: Install browser-extension deps
        # ``--frozen-lockfile`` aborts if pnpm-lock.yaml is out of
        # sync — prevents a stale lockfile from quietly resolving
        # different versions in CI than in dev.
        run: cd cortex/apps/browser_extension && pnpm install --frozen-lockfile

      - name: Build DMG (ad-hoc signed)
        env:
          # Production releases should set CORTEX_SIGN_IDENTITY +
          # CORTEX_NOTARIZE_PROFILE as repo secrets. Without them the
          # script falls back to ad-hoc signing for portfolio builds.
          CORTEX_SIGN_IDENTITY: ${{ secrets.CORTEX_SIGN_IDENTITY }}
          CORTEX_NOTARIZE_PROFILE: ${{ secrets.CORTEX_NOTARIZE_PROFILE }}
        run: ./cortex/scripts/build_macos_app.sh

      - name: Locate DMG
        id: locate
        run: |
          DMG=$(ls dist/Cortex*.dmg | head -1)
          echo "dmg-path=$DMG" >> "$GITHUB_OUTPUT"
          echo "Built: $DMG ($(du -h "$DMG" | awk '{print $1}'))"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: cortex-dmg
          path: ${{ steps.locate.outputs.dmg-path }}
          retention-days: 14

  attach-to-release:
    name: Attach DMG to GitHub release
    needs: build-dmg
    runs-on: ubuntu-latest
    steps:
      - name: Download DMG artifact
        uses: actions/download-artifact@v8
        with:
          name: cortex-dmg
          path: ./artifact

      - name: Attach to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: ./artifact/*.dmg
          fail_on_unmatched_files: true
          generate_release_notes: false
